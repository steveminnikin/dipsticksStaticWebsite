[[redirects]]
  from = "/dipstick_rubbing_guide.aspx"
  to = "/guides/dipstick-rubbing-guide/"
  status = 301

# Old download paths (case-insensitive on some servers)
[[redirects]]
  from = "/Downloads/*"
  to = "/downloads/:splat"
  status = 301
